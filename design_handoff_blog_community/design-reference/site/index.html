    .setup-row { grid-template-columns: 1fr !important; }
    .admin-stats { grid-template-columns: 1fr !important; }
    .admin-sub-row { grid-template-columns: 1fr !important; }
    .admin-sub-cover { display: none; }
    .admin-sub-actions { justify-content: flex-start !important; }
  }
  @media (min-width: 861px) and (max-width: 1080px) {
    .blog-grid, .community-grid { grid-template-columns: repeat(2, 1fr) !important; }
